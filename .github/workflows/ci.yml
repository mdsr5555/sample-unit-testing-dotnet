name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILD_CONFIGURATION: Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/ # Change this if your TF files are elsewhere
          framework: terraform
          # This generates both a SARIF file (for Security Tab) and Markdown (for Summary)
          output_format: sarif,github_failed_only
          output_file_path: results.sarif,results.md
          soft_fail: true # Allows the pipeline to continue even if security issues are found

      - name: Publish to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() # Upload even if the scan found issues
        with:
          sarif_file: results.sarif

      - name: Publish to Workflow Summary
        if: always()
        run: |
          cat results.md >> $GITHUB_STEP_SUMMARY

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore unit-testing-using-dotnet-test.sln

      - name: Lint / formatting check
        run: dotnet format unit-testing-using-dotnet-test.sln --verify-no-changes
        continue-on-error: true

      - name: Build
        run: dotnet build unit-testing-using-dotnet-test.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Run unit tests
        run: dotnet test PrimeService.Tests/PrimeService.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --logger "trx" --results-directory TestResults

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-empty: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          if-no-files-found: error

      - name: TODO Deployment
        run: echo "TODO - Deployment"