name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: read
  checks: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILD_CONFIGURATION: Release
      SOLUTION_FILE: unit-testing-using-dotnet-test.sln
      API_PROJECT: PrimeService.Api/PrimeService.Api.csproj
      TEST_PROJECT: PrimeService.Tests/PrimeService.Tests.csproj
      PUBLISH_DIR: publish

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif,github_failed_only
          output_file_path: results.sarif,results.md
          soft_fail: true

      - name: Publish to Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Publish to Workflow Summary
        if: always()
        run: |
          cat results.md >> $GITHUB_STEP_SUMMARY

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Lint / formatting check
        run: dotnet format ${{ env.SOLUTION_FILE }} --verify-no-changes

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Run unit tests
        run: dotnet test ${{ env.TEST_PROJECT }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --logger "trx" --results-directory TestResults

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests
          path: "**/TestResults/*.trx"
          reporter: dotnet-trx
          fail-on-empty: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"
          if-no-files-found: error

      - name: Publish application
        run: dotnet publish ${{ env.API_PROJECT }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --output ${{ env.PUBLISH_DIR }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: ${{ env.PUBLISH_DIR }}/
          if-no-files-found: error