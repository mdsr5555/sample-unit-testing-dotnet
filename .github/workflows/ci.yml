name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    env:
      BUILD_CONFIGURATION: Release
      TEST_RESULTS_PATH: TestResults

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Lint / formatting check
        run: dotnet format --verify-no-changes --severity error

      - name: Build
        run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --logger "trx" --results-directory ${{ env.TEST_RESULTS_PATH }}

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: TestResults/*.trx
          reporter: dotnet-trx

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults

      - name: TODO Deployment
        run: echo "TODO - Deployment"