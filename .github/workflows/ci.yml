name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  # schedule:
  #   - cron: "0 8 * * *" # 9 AM UK during BST tim

permissions:
  contents: read
  checks: write
  # Required for Gitleaks to write reports/annotations
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILD_CONFIGURATION: Release
      SOLUTION_FILE: unit-testing-using-dotnet-test.sln
      API_PROJECT: PrimeService.Api/PrimeService.Api.csproj
      TEST_PROJECT: PrimeService.Tests/PrimeService.Tests.csproj
      PUBLISH_DIR: publish
      PACKAGE_FILE: app-build-${{ github.sha }}.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # IMPORTANT: Gitleaks needs full history to scan properly

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/repo \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.24.3 \
            detect \
            --source /repo \
            --config /repo/.gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1 \
            --log-opts="--all"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Lint / formatting check
        run: dotnet format ${{ env.SOLUTION_FILE }} --verify-no-changes

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Run unit tests
        run: dotnet test ${{ env.TEST_PROJECT }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --logger "trx" --results-directory TestResults

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests
          path: "**/TestResults/*.trx"
          reporter: dotnet-trx
          fail-on-empty: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: "**/TestResults/*.trx"
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish application
        run: dotnet publish ${{ env.API_PROJECT }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --output ${{ env.PUBLISH_DIR }}

      - name: Create deployment package
        run: |
          cd ${{ env.PUBLISH_DIR }}
          zip -r "../${{ env.PACKAGE_FILE }}" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build-${{ github.sha }}
          path: ${{ env.PACKAGE_FILE }}
          if-no-files-found: error
          retention-days: 14
