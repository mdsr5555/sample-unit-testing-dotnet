trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: Release
  azureServiceConnection: 'sc-project2026'
  webAppName: 'your-webapp-name'
  publishDir: '$(Build.ArtifactStagingDirectory)/publish'

stages:
- stage: DeployApp
  displayName: Publish and Deploy App
  jobs:
  - job: Deploy
    displayName: Publish and deploy to Azure Web App
    steps:
    - checkout: self
      clean: true

    - task: UseDotNet@2
      displayName: Use .NET 8 SDK
      inputs:
        packageType: sdk
        version: 8.0.x

    - script: |
        dotnet restore unit-testing-using-dotnet-test.sln
        dotnet build unit-testing-using-dotnet-test.sln --configuration $(buildConfiguration) --no-restore
        dotnet publish PrimeService/PrimeService.csproj --configuration $(buildConfiguration) --no-build --output $(publishDir)
      displayName: Build and publish app

    - task: AzureWebApp@1
      displayName: Deploy to Azure Web App
      inputs:
        azureSubscription: $(azureServiceConnection)
        appType: webAppLinux
        appName: $(webAppName)
        package: $(publishDir)