# Include the default Gitleaks rules
# This ensures that even if you have an allowlist, the standard checks still run
[extend]
useDefault = true

[[rules]]
id = "dotnet-appsettings-sensitive-value"
description = "Detect sensitive configuration values in .NET appsettings files"
regex = '''(?i)"[^"]*(secret|password|token|apikey|api_key|connectionstring|accountkey)[^"]*"\s*:\s*"([^"]{8,})"'''
path = '''(?i)appsettings(\.[^/\\]+)?\.json$'''
secretGroup = 2
entropy = 3.0
keywords = [
    "secret",
    "password",
    "token",
    "apikey",
    "api_key",
    "connectionstring",
    "accountkey"
]

[allowlist]
description = "Allow specific files or paths"
paths = [
    '''terraform/appgw.crt''',
    '''terraform/appgw.key''',
    '''terraform/privkey.pem''',
    '''terraform/appgw_base64.txt'''
]
